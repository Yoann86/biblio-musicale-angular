<!-- track-card.html (enrichi) -->
<article class="card" [class.active]="active()" (click)="select.emit(track())" (contextmenu)="$event.preventDefault(); open.emit(track())">
  <img [src]="track().coverUrl" [alt]="track().title" />
  <h3>{{ track().title }}</h3>
  <p>{{ track().artist }}</p>
  <p>{{ track().durationSeconds | durationFormat }}</p>
  @if (active()) {
    <span class="badge">▶ En lecture</span>
  }
  @switch (true) {
    @case (track().rating >= 9) { <span class="badge gold">⭐ Coup de cœur</span> }
    @case (track().rating >= 7) { <span class="badge">👍 Recommandé</span> }
    @default { <span class="badge muted">À découvrir</span> }
  }
</article>
